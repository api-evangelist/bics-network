aid: bics-network
name: BICS
review:
  question: Does BICS expose a documented public WebSocket API?
  answer: false
  date: '2026-07-11'
  reviewer: API Evangelist
  asyncapiSpecCreated: false
  asyncapiScopeNote: >-
    No AsyncAPI document was authored. Every documented BICS developer-portal API
    is request/response REST over HTTPS (OpenAPI 3.0.1). BICS delivers
    server-to-client events through HTTP callbacks/webhooks (for example inbound
    SMS and delivery-info subscriptions post to a customer-supplied URL), not a
    server-push WebSocket or SSE transport on its own API, so there is no
    WebSocket surface to model.
findings:
  summary: >
    BICS does not publish a documented public WebSocket API. BICS is an
    international communications enabler and wholesale carrier (part of Proximus
    Global, alongside Telesign and Route Mobile). Its developer portal at
    developer.bics.com exposes OAuth2-secured REST APIs under
    https://api.bics.com (production) and https://sandbox.api.bics.com (sandbox
    for the MyNumbers family). Eight REST APIs are documented with OpenAPI 3.0.1:
    SMS (v3), MyNumbers, MyNumbers Address Management, MyNumbers CDR, MyNumbers
    Disconnection, MyNumbers Emergency Services, MyNumbers Number Porting, and
    Connect. All are pure request/response REST. Event delivery (inbound SMS,
    delivery info) is via HTTP callbacks/webhooks to a customer URL - not a
    WebSocket. No ws:// or wss:// endpoint is documented anywhere on the portal.
  accessModel: >
    The developer portal is not fully self-serve. A developer registers to
    consume an API, BICS approves the consumption (confirmed by email), and the
    emailed instructions explain how to create an OAuth2 token that is then sent
    as a Bearer credential. Sandbox base URLs are available for the MyNumbers
    family. BICS's mobile-identity products - phone number verification,
    HLR/reachability lookup, SIM-swap detection, and device-location signals for
    anti-fraud and KYC - are NOT on the self-serve portal; they are marketed and
    delivered as partner/carrier contract products across the Proximus Global
    network. Those verification/fraud/device-location entries in apis.yml are
    therefore endpointsModeled (no published OpenAPI surface), not fabricated
    request definitions.
  endpointsModeled:
    - The BICS Number Verification API entry is modeled from BICS marketing and
      the Proximus Global identity portfolio; no self-serve OpenAPI is published.
    - The BICS Fraud Prevention and Reachability API entry (HLR/reachability
      lookup, SIM-swap, device-location) is modeled and aligns with GSMA Open
      Gateway / CAMARA network APIs; it is contact-sales, not self-serve.
  transports:
    - protocol: REST
      scheme: https
      baseURL: https://api.bics.com
      documented: true
      note: All eight documented developer-portal APIs are OpenAPI 3.0.1 REST. Sandbox at https://sandbox.api.bics.com for the MyNumbers family.
    - protocol: Webhook
      scheme: https
      documented: true
      note: Inbound SMS and delivery-info subscriptions post events to a customer-supplied HTTP callback URL. Server-to-endpoint HTTP, not WebSocket.
    - protocol: WebSocket
      scheme: wss
      documented: false
      note: No WebSocket endpoint is documented on the BICS developer portal or in any of the eight OpenAPI definitions as of the review date.
  endpointsConfirmedRest:
