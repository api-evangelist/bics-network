  sources:
    - url: https://developer.bics.com/portal/apis
      type: Documentation
      note: Developer portal API catalog; eight LIVE REST APIs with OpenAPI 3.0.1 definitions and OAuth2 policy.
    - url: https://developer.bics.com/portal/welcome
      type: Documentation
      note: Access-token (Bearer) authentication required on each request; REST standard.
    - url: https://www.bics.com/developers-hub/
      type: Documentation
      note: Positions messaging, voice, numbering and fraud-prevention products; links to the developer portal.
    - url: https://www.proximusglobal.com/
      type: Website
      note: BICS is part of Proximus Global together with Telesign and Route Mobile; digital identity delivered across the group.
