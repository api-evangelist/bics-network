    - POST   https://api.bics.com/sms/v3/conversions
    - POST   https://api.bics.com/sms/v3/conversionsinfos
    - GET    https://api.bics.com/mynumbers-number/v1/numbers
    - GET    https://api.bics.com/mynumbers-number/v1/numbers/{number}
    - POST   https://api.bics.com/mynumbers-number/v1/order
    - POST   https://api.bics.com/mynumbers-number/v1/order/bulk
    - GET    https://api.bics.com/mynumbers-number/v1/order/{orderId}
    - GET    https://api.bics.com/mynumbers-number/v1/availablenumbers
    - GET    https://api.bics.com/mynumbers-number/v1/pricelist/product/{product}
    - GET,POST https://api.bics.com/mynumbers-porting/v1/portings
    - GET,DELETE https://api.bics.com/mynumbers-porting/v1/portings/{portingRequestId}
    - GET,POST https://api.bics.com/mynumbers-porting/v1/portings/{portingRequestId}/documents
    - POST   https://api.bics.com/mynumbers-cdr/v1/cdrs
