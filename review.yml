    - GET    https://api.bics.com/mynumbers-cdr/v1/cdrs/{id}/download/{format}
    - GET,POST https://api.bics.com/mynumbers-address-management/v1/addresses
    - POST   https://api.bics.com/mynumbers-disconnection/v1/disconnections/orders
    - GET,POST https://api.bics.com/mynumbers-emergency-services/v1/emergencyservices/orders
