actions:
  asyncapiPath: null
  apisYmlUpdated: true
  reason: >
    No WebSocket protocol surface exists. Every documented BICS API is
    request/response REST (OpenAPI 3.0.1) with event delivery via HTTP
    callbacks/webhooks. No AsyncAPI document was created because there is no
    server-push transport (WebSocket or SSE) on BICS's own API to model.
