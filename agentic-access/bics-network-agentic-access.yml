  operationId: Get Inbound Messages
  x-agentic-access:
    action-class: connected
    consequence: read
    subject: optional
    token:
      max-ttl: 3600
    audit: none
- path: /outbound/{senderAddress}/requests/{requestId}/deliveryInfos
  method: get
  operationId: Get Delivery Infos
  x-agentic-access:
    action-class: connected
    consequence: read
    subject: optional
    token:
      max-ttl: 3600
    audit: none
