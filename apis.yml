- aid: bics-network:bics-number-verification-api
  name: BICS Number Verification API
  tags:
  - Number Verification
  - Mobile Identity
  - Anti-Fraud
  - OTP
  - KYC
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bics.com/developers-hub/
  properties:
  - url: https://www.bics.com/developers-hub/
    type: Documentation
  description: >-
    Phone number verification and mobile authentication for anti-fraud, KYC and
    onboarding - validating that a mobile number is real, active, and controlled
    by the user, including OTP-based flows. Marketed by BICS and delivered across
    the Proximus Global network as a partner and carrier contract product;
    access is via contact-sales onboarding rather than the self-serve developer
    portal, so any request surface here is endpointsModeled, not a published
    OpenAPI definition.
- aid: bics-network:bics-fraud-prevention-reachability-api
  name: BICS Fraud Prevention and Reachability API
  tags:
  - Anti-Fraud
  - Fraud Prevention
  - HLR Lookup
  - Reachability
  - Device Location
  - Mobile Identity
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://www.bics.com/developers-hub/
  properties:
  - url: https://www.bics.com/developers-hub/
    type: Documentation
  description: >-
    Network-signal services for fraud prevention and mobile identity - HLR and
    reachability lookup (operator, ported status, active/blocked SIM state),
    SIM-swap detection, and device-location signals used to score risk on logins
    and transactions. These carrier-network capabilities are offered by BICS as
    contract products across the Proximus Global network and align with GSMA Open
    Gateway / CAMARA network APIs; they are contact-sales rather than self-serve,
    so the surface here is endpointsModeled, not a published OpenAPI definition.
