  properties:
  - url: https://developer.bics.com/portal/apis
    type: Documentation
  - url: openapi/bics-mynumbers-openapi.json
    type: OpenAPI
  description: >-
    Order and manage ready-to-use BICS Cloud Numbers (IBN), International
    Freephone Numbers (ITFS) and Global Mobile Numbers (GMN). Check stock,
    price lists, and reference data (locations, POPs, languages), place single
    or bulk orders, configure routes, and manage number-to-address references.
    A sandbox base URL is published at sandbox.api.bics.com. Confirmed endpoints
    from the OpenAPI 3.0.1 definition.
