aid: bics-network
url: https://raw.githubusercontent.com/api-evangelist/bics-network/refs/heads/main/apis.yml
name: BICS
kind: company
description: >-
  BICS is an international communications enabler and wholesale carrier, part of
  Proximus Global (alongside Telesign and Route Mobile). Its developer portal
  exposes OAuth2-secured REST APIs at api.bics.com for A2P SMS and OTP delivery,
  global number provisioning and portability (MyNumbers), call detail records,
  emergency services, and carrier-grade cloud connectivity. BICS also offers
  mobile identity capabilities - phone number verification, HLR/reachability
  lookup, SIM-swap detection and device-location signals for anti-fraud and KYC -
  as partner and carrier contract products across the Proximus Global network
  rather than as self-serve endpoints.
