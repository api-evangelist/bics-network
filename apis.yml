- aid: bics-network:bics-sms-api
  name: BICS SMS API
  tags:
  - SMS
  - OTP
  - Number Verification
  - A2P
  - Messaging
  image: https://kinlane-images.s3.amazonaws.com/shared/apis-json/apis-json-logo.jpg
  humanURL: https://developer.bics.com/portal/apis
  baseURL: https://api.bics.com/sms/v3
  properties:
  - url: https://developer.bics.com/portal/apis
    type: Documentation
  - url: openapi/bics-sms-openapi.json
    type: OpenAPI
  description: >-
    RESTful A2P messaging API for sending text messages to mobile phones
    worldwide, including one-time passcodes (OTP) for phone number verification
    and two-factor authentication. Supports single and bulk outbound requests,
    delivery-info retrieval, inbound message subscriptions, and conversion
    reporting. Confirmed endpoints from the OpenAPI 3.0.1 definition.
- aid: bics-network:bics-mynumbers-api
  name: BICS MyNumbers API
  tags:
  - Numbering
  - Telecom
  - Provisioning
